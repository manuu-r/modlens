<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Open ModLens</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #fafafa;
        --panel: #ffffff;
        --text: #1a1a1b;
        --muted: #6b7280;
        --border: #ececec;
        --accent: #ff4500;
        font-family:
          -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0c0d0f;
          --panel: #121316;
          --text: #f4f4f5;
          --muted: #8b9098;
          --border: #24272d;
          --accent: #ff7043;
        }
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: var(--bg);
        color: var(--text);
      }

      body {
        display: grid;
        place-items: center;
      }

      .launch {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 16px;
        align-items: center;
        width: 100%;
        max-width: 640px;
        min-height: 112px;
        padding: 18px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--panel);
      }

      h1 {
        margin: 0;
        font-size: 18px;
        font-weight: 650;
        letter-spacing: 0;
        line-height: 1.2;
      }

      p {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.35;
      }

      button {
        min-height: 40px;
        padding: 0 16px;
        border: 0;
        border-radius: 6px;
        background: var(--accent);
        color: #ffffff;
        cursor: pointer;
        font: inherit;
        font-size: 13px;
        font-weight: 650;
      }

      button:disabled {
        cursor: wait;
        opacity: 0.72;
      }

      @media (max-width: 420px) {
        .launch {
          grid-template-columns: 1fr;
          min-height: 132px;
        }

        button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <section class="launch" aria-label="Open ModLens">
      <div>
        <h1>ModLens</h1>
        <p>Open the moderation workspace in expanded view for queue, user, site, rule, and alert tools.</p>
      </div>
      <button id="open-modlens" type="button">Open ModLens</button>
    </section>
    <script type="module" src="./preview.ts"></script>
  </body>
</html>
