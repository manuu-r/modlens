# Dependabot configuration to update pnpm packages weekly
version: 2
updates:
  # GitHub uses the "npm" ecosystem value for pnpm lockfiles.
  - package-ecosystem: "npm"
    directory: "/" # Location of package.json and pnpm-lock.yaml
    schedule:
      interval: "weekly"
      day: "tuesday"
    open-pull-requests-limit: 10 # Optional: prevents PR spam by limiting active updates
